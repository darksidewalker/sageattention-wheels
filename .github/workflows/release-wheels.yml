name: Release Prebuilt Wheels

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g., v2.1.2-1)'
        required: true
        default: 'v2.1.2-1'
      extra_cuda_version:
        description: 'Add an extra CUDA version to compile (e.g., 13.4)'
        required: false
        default: ''

permissions:
  contents: write # Crucial permission allowing the runner to create a Release

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      cuda_matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          base_matrix='["12.8", "13.0", "13.2"]'
          extra="${{ github.event.inputs.extra_cuda_version }}"
          if [ -n "$extra" ]; then
            final_matrix=$(echo "$base_matrix" | jq ". + [\"$extra\"]" -c)
          else
            final_matrix=$base_matrix
          fi
          echo "matrix=${final_matrix}" >> $GITHUB_OUTPUT

  build-wheels:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda: ${{ fromJson(needs.setup-matrix.outputs.cuda_matrix) }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install CUDA Toolkit ${{ matrix.cuda }}
      uses: jimmy-xu/install-cuda@v2.3.0
      with:
        cuda: "${{ matrix.cuda }}.0"
        method: 'network'

    - name: Install Tools & PyTorch
      run: |
        python -m pip install --upgrade pip setuptools wheel ninja
        CUDA_INDEX_TAG="cu$(echo '${{ matrix.cuda }}' | tr -d '.')"
        python -m pip install torch==2.12.0 --index-url https://download.pytorch.org/whl/${CUDA_INDEX_TAG}

    - name: Clone & Compile SageAttention
      run: |
        git clone https://github.com/thu-ml/SageAttention.git
        cd SageAttention
        FORCE_CUDA="1" MAX_JOBS="4" TORCH_CUDA_ARCH_LIST="8.0;8.9;9.0;12.0" python setup.py bdist_wheel

    - name: Canonicalize Wheel Name
      run: |
        cd SageAttention/dist
        CUDA_INDEX_TAG="cu$(echo '${{ matrix.cuda }}' | tr -d '.')"
        for old_name in *.whl; do
            if [[ "$old_name" == *"+${CUDA_INDEX_TAG}"* ]]; then
                new_name="${old_name//+${CUDA_INDEX_TAG}/+pt2.12${CUDA_INDEX_TAG}}"
                mv "$old_name" "$new_name"
            else
                new_name="$old_name"
            fi
        done
        mkdir -p ../../wheelhouse
        cp "$new_name" ../../wheelhouse/

    - name: Temporarily Store Wheel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: wheels-cuda-${{ matrix.cuda }}
        path: wheelhouse/*.whl

  publish-release:
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
    - name: Create Isolated Output Directory
      run: mkdir -p final_wheels

    - name: Download All Artifacts from Workers
      uses: actions/download-artifact@v4
      with:
        pattern: wheels-cuda-*
        path: final_wheels
        merge-multiple: true

    - name: Create GitHub Release and Upload Binaries
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag_name }}
        name: SageAttention Prebuilts (${{ github.event.inputs.tag_name }})
        body: |
          Automated precompiled wheels for SageAttention.
          - Python: 3.12
          - PyTorch: 2.12.0
          - Target Architectures: Ampere, Ada, Hopper, Blackwell (sm_80, sm_89, sm_90, sm_120)
        files: final_wheels/*.whl
        draft: false
        prerelease: false
