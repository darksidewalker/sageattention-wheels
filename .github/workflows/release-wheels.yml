name: Release Prebuilt Wheels (Multi-Python)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g., v2.2.0-1)'
        required: true
        default: 'v2.2.0-1'

permissions:
  contents: write

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Define explicit matrix rows for combinations of Python + Torch + CUDA
        include:
          # --- Python 3.12 (Modern Stack) ---
          - python: "3.12"
            cuda: "12.6"
            torch: "2.12.0"
            arch: "8.0;8.9;9.0;12.0"
          - python: "3.12"
            cuda: "13.0"
            torch: "2.12.0"
            arch: "8.0;8.9;9.0;12.0"
          - python: "3.12"
            cuda: "13.2"
            torch: "2.12.0"
            arch: "8.0;8.9;9.0;12.0"
          
          # --- Python 3.13 (Next-Gen Stack) ---
          # SageAttention compilation targeting Python 3.13 environments
          - python: "3.13"
            cuda: "12.6"
            torch: "2.13.0"
            arch: "8.0;8.9;9.0;12.0"
          - python: "3.13"
            cuda: "13.2"
            torch: "2.13.0"
            arch: "8.0;8.9;9.0;12.0"

          # --- Python 3.12 (Legacy Pascal Match) ---
          - python: "3.12"
            cuda: "12.1"
            torch: "2.4.1"
            arch: "6.1"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}

    - name: Install CUDA Toolkit ${{ matrix.cuda }}
      uses: Jimver/cuda-toolkit@v0.2.35
      with:
        cuda: "${{ matrix.cuda }}.0"
        method: 'network'

    - name: Install Native Development Headers
      run: |
        # Force cache synchronization to prevent exit code 100
        sudo apt-get update
        
        # Now safely pull down headers matching the active matrix row
        sudo apt-get install -y build-essential git python${{ matrix.python }}-dev

    - name: Install Python Package Tools & Target PyTorch
      run: |
        python -m pip install --upgrade pip setuptools wheel ninja
        CUDA_INDEX_TAG="cu$(echo '${{ matrix.cuda }}' | tr -d '.')"
        python -m pip install torch==${{ matrix.torch }} --index-url https://download.pytorch.org/whl/${CUDA_INDEX_TAG}

    - name: Clone & Compile SageAttention
      run: |
        git clone https://github.com/thu-ml/SageAttention.git
        cd SageAttention
        
        export FORCE_CUDA="1" 
        export MAX_JOBS="2" 
        export TORCH_CUDA_ARCH_LIST="${{ matrix.arch }}"
        
        python setup.py bdist_wheel

    - name: Canonicalize Wheel Name
      run: |
        cd SageAttention/dist
        CUDA_INDEX_TAG="cu$(echo '${{ matrix.cuda }}' | tr -d '.')"
        TORCH_SHORT=$(echo "${{ matrix.torch }}" | cut -d. -f1,2)
        
        for old_name in *.whl; do
            if [[ "$old_name" == *"+${CUDA_INDEX_TAG}"* ]]; then
                new_name="${old_name//+${CUDA_INDEX_TAG}/+pt${TORCH_SHORT}${CUDA_INDEX_TAG}}"
                mv "$old_name" "$new_name"
                echo "Canonicalized wheel to: $new_name"
            else
                new_name="$old_name"
            fi
        done
        mkdir -p ../../wheelhouse
        cp "$new_name" ../../wheelhouse/

    - name: Temporarily Store Wheel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: wheels-py${{ matrix.python }}-cuda-${{ matrix.cuda }}
        path: wheelhouse/*.whl

  publish-release:
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
    - name: Create Isolated Output Directory
      run: mkdir -p final_wheels

    - name: Download All Artifacts from Workers
      uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        path: final_wheels
        merge-multiple: true

    - name: Create GitHub Release and Upload Binaries
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag_name }}
        name: SageAttention Prebuilts (${{ github.event.inputs.tag_name }})
        body: |
          Automated multi-environment precompiled wheels for SageAttention.
          
          Supported runtimes include:
          - **Python 3.12** targets with PyTorch 2.12.0 & 2.4.1
          - **Python 3.13** targets with PyTorch 2.13.0
        files: final_wheels/*.whl
        draft: false
        prerelease: false
